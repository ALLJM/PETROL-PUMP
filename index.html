<!-- Petrol Retail Outlet (RO) — launcher -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Petrol Retail Outlet (RO)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#efece6;--surface:#ffffff;--ink:#1a1a1a;--muted:#8a8a8f;--line:#e4e0d8;
    --shadow:0 2px 4px rgba(0,0,0,.04),0 8px 28px rgba(0,0,0,.08);
    --shadow-h:0 4px 8px rgba(0,0,0,.06),0 16px 40px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;min-height:100vh;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;align-items:center;justify-content:center;padding:32px 20px;
  }
  .wrap{max-width:520px;width:100%;text-align:center}

  /* ── header ── */
  .hero-icon{font-size:48px;line-height:1;margin-bottom:14px}
  .title{
    font-family:'Manrope',sans-serif;font-weight:900;font-size:36px;
    color:var(--ink);letter-spacing:-.5px;margin:0 0 8px;
  }
  .subtitle{font-size:16px;color:var(--muted);margin:0 0 36px;font-weight:500}

  /* ── cards ── */
  a.card{
    display:flex;align-items:center;gap:18px;
    text-decoration:none;background:var(--surface);
    border:1px solid var(--line);border-radius:20px;
    padding:22px 22px;margin-bottom:14px;
    box-shadow:var(--shadow);transition:.18s;text-align:left;
    -webkit-user-select:none;user-select:none;
  }
  a.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);border-color:rgba(0,0,0,.12)}
  a.card:active{transform:translateY(0);box-shadow:var(--shadow)}

  /* ── icon badge ── */
  .ic{
    width:62px;height:62px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:30px;flex-shrink:0;
  }
  .ic-sup{background:linear-gradient(145deg,#1c2026,#2d3540)}
  .ic-ca {background:linear-gradient(145deg,#1c2026,#2d3540)}
  .ic-adm{background:linear-gradient(145deg,#2a3fa0,#4a5fc4)}

  /* ── card text ── */
  .ct b{
    display:block;font-family:'Manrope',sans-serif;
    font-size:19px;font-weight:800;color:var(--ink);margin-bottom:4px;
  }
  .ct span{font-size:14px;color:var(--muted);line-height:1.45;font-weight:500}

  /* ── footer ── */
  .foot{margin-top:22px;font-size:13px;color:var(--muted);font-weight:500}

  @media(max-width:480px){
    .title{font-size:28px}
    .subtitle{font-size:14px;margin-bottom:28px}
    .ic{width:54px;height:54px;font-size:26px;border-radius:14px}
    .ct b{font-size:17px}
    .ct span{font-size:13px}
    a.card{padding:18px 16px;gap:14px}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="hero-icon">&#128686;</div>
    <div class="title">Petrol Retail Outlet (RO)</div>
    <div class="subtitle">Daily Collection Report</div>

    <a class="card" href="supervisor.html">
      <div class="ic ic-sup">&#128202;</div>
      <div class="ct">
        <b>Supervisor</b>
        <span>Assign shifts, meter readings, collection &amp; daily DCR</span>
      </div>
    </a>

    <a class="card" href="ca.html">
      <div class="ic ic-ca">&#9981;</div>
      <div class="ct">
        <b>Customer Attendant</b>
        <span>Photograph opening &amp; closing meter readings</span>
      </div>
    </a>

    <a class="card" href="admin.html">
      <div class="ic ic-adm">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="38" height="28" fill="none">
          <!-- brim -->
          <ellipse cx="32" cy="38" rx="30" ry="8" fill="#c8a84b"/>
          <ellipse cx="32" cy="36" rx="30" ry="6" fill="#e8c46a"/>
          <!-- crown -->
          <path d="M14 36 C14 36 12 18 20 12 C24 8 28 7 32 7 C36 7 40 8 44 12 C52 18 50 36 50 36 Z" fill="#e8c46a"/>
          <!-- indent at top -->
          <path d="M22 10 C24 6 28 4 32 4 C36 4 40 6 42 10 C39 9 36 8.5 32 8.5 C28 8.5 25 9 22 10Z" fill="#c8a84b"/>
          <!-- band -->
          <rect x="16" y="28" width="32" height="5" rx="2" fill="#a07830"/>
          <!-- band buckle -->
          <rect x="29" y="28.5" width="6" height="4" rx="1" fill="#f5d980" stroke="#a07830" stroke-width=".5"/>
        </svg>
      </div>
      <div class="ct">
        <b>Admin</b>
        <span>Full dashboard &mdash; all dates, all CAs, week &amp; month view</span>
      </div>
    </a>

    <div class="foot">Sign-in required &middot; works best in Chrome</div>
  </div>
</body>
</html>
